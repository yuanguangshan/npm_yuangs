name: Publish to npm

on:
  push:
    tags:
      - "v*"
  release:
    types: [created]

jobs:
  verify-tla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java (required for TLC)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache TLA+ Tools
        uses: actions/cache@v4
        with:
          path: tla2tools.jar
          key: ${{ runner.os }}-tla2tools-v1.8.0

      - name: Download TLA+ tools
        run: |
          curl -fsSL https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar -o tla2tools.jar

      - name: Run TLA+ model check
        run: |
          java -jar tla2tools.jar -workers auto docs/specs/CodeChangeGovernanceV2.tla

  publish:
    needs: verify-tla
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org/"

      - run: npm ci
      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
